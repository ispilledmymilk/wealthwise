services:
  postgres:
    image: postgres:15
    container_name: wealthwise_postgres
    environment:
      POSTGRES_DB: wealthwise
      POSTGRES_USER: wealthuser
      POSTGRES_PASSWORD: wealthpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wealthuser -d wealthwise"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:6
    container_name: wealthwise_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: wealthwise_backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/wealthwise
      SPRING_DATASOURCE_USERNAME: wealthuser
      SPRING_DATASOURCE_PASSWORD: wealthpass
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/wealthwise
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: wealthwise_frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  pgdata:
  mongodata:

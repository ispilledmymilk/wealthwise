server:
  port: 8080

spring:
  application:
    name: wealthwise-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/wealthwise
    username: wealthuser
    password: wealthpass
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  data:
    mongodb:
      uri: mongodb://localhost:27017/wealthwise
  flyway:
    enabled: true

app:
  jwt:
    secret: wealthwise-dev-jwt-secret-key-at-least-32-chars-long-for-hs256
    expiration: 86400000
